name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: app
        run: npm run build

      - name: Prepare deployment with root redirect
        run: |
          mkdir -p _site/Delivery-Checker12
          cp -r app/dist/. _site/Delivery-Checker12/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0;url=/Delivery-Checker12/">
          <script>window.location.replace('/Delivery-Checker12/');</script>
          </head><body></body></html>
          EOF

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
